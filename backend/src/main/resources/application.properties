spring.application.name=rest_linea
server.port=9000

cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:8005,http://localhost:3000}
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=Authorization,Content-Type
spring.web.cors.allow-credentials=true


security.jwt.secret-key=${JWT_SECRET}
security.jwt.expiration-time=${JWT_EXPIRATION:3600000}

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

## Hibernate properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# GitHub OAuth2
# Create an OAuth App at: https://github.com/settings/developers
# Set "Authorization callback URL" to: http://localhost:9000/login/oauth2/code/github
spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID:none}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET:none}
spring.security.oauth2.client.registration.github.scope=user:email,read:user

# URL of the React frontend (used for post-OAuth redirect with JWT)
frontend.base-url=${FRONTEND_BASE_URL:http://localhost:3000}

# Swagger / OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html


