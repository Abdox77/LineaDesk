name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Create application.properties for CI
        run: |
          mkdir -p src/main/resources
          cat > src/main/resources/application.properties << 'EOF'
          spring.application.name=rest_linea
          server.port=9000
          cors.allowed-origins=http://localhost:3000
          security.jwt.secret-key=dGVzdC1zZWNyZXQta2V5LWZvci1jaS1waXBlbGluZS1vbmx5LW5vdC1mb3ItcHJvZHVjdGlvbi11c2U=
          security.jwt.expiration-time=3600000
          spring.datasource.url=jdbc:h2:mem:cidb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
          spring.datasource.username=sa
          spring.datasource.password=
          spring.datasource.driver-class-name=org.h2.Driver
          spring.jpa.hibernate.ddl-auto=create-drop
          spring.jpa.open-in-view=false
          EOF
          sed -i 's/^[[:space:]]*//' src/main/resources/application.properties

      - name: Build project
        run: ./mvnw compile -B -q

      - name: Run tests
        run: ./mvnw test -B

      - name: Package application
        run: ./mvnw package -B -DskipTests

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: backend/target/surefire-reports/
          retention-days: 7

      - name: Upload build artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: backend/target/*.jar
          retention-days: 14
    