
services:
  db:
    image: mysql:8.0
    container_name: lineadesk-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: LineaDesk
      MYSQL_USER: amohdi_linea
      MYSQL_PASSWORD: linea_desk2026
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - lineadesk
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: lineadesk-backend
    restart: unless-stopped
    ports:
      - "9000:9000"
    environment:
      DB_URL: jdbc:mysql://db:3306/LineaDesk?serverTimezone=UTC&allowPublicKeyRetrieval=true&useSSL=false
      DB_USERNAME: amohdi_linea
      DB_PASSWORD: linea_desk2026
      JWT_SECRET: bXlTdXBlclNlY3JldEtleUZvckxpbmVhRGVzazIwMjZQcm9kdWN0aW9u
      CORS_ALLOWED_ORIGINS: http://localhost:3000
      FRONTEND_BASE_URL: http://localhost:3000
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-none}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-none}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - lineadesk

  frontend:
    build:
      context: ./frontend
      args:
        REACT_APP_API_BASE: http://localhost:9000
    container_name: lineadesk-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - lineadesk

volumes:
  db_data:

networks:
  lineadesk:
    driver: bridge
